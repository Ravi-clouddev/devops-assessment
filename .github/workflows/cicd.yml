name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Source
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install Dependencies
      run: |
        cd app
        npm install

    - name: Build Docker Image
      run: |
        docker build -t devops-app ./app

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:

    - name: Checkout Source
      uses: actions/checkout@v4

    - name: Run Tests
      run: |
        cd app
        npm test

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:

    - name: Deployment Success
      run: echo "Application deployed successfully"